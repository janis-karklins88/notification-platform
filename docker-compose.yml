services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: notif
      POSTGRES_USER: notif
      POSTGRES_PASSWORD: notif
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: notif
      RABBITMQ_DEFAULT_PASS: notif
    ports:
      - "5672:5672"
      - "15672:15672"

  backend:
    build:
      context: ./backend
    environment:
      SPRING_PROFILES_ACTIVE: docker
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - rabbitmq

volumes:
  pgdata: