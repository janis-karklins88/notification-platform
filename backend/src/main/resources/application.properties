spring.application.name=notification-platform

outbox.dispatch.batch-size=200
outbox.dispatch.fixed-delay-ms=5000
outbox.dispatch.in-progress-timeout-ms=60000
outbox.dispatch.max-attempts=10
outbox.dispatch.finalize-retry-attempts=3
outbox.dispatch.finalize-retry-delay-ms=200

outbox.dispatch.enabled=false

spring.rabbitmq.publisher-confirm-type=correlated
spring.rabbitmq.publisher-returns=true
spring.rabbitmq.template.mandatory=true
