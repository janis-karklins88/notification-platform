server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://postgres:5432/notif
    username: notif
    password: notif

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      "[hibernate.format_sql]": true

  flyway:
    enabled: true

  rabbitmq:
    host: rabbitmq
    port: 5672
    username: notif
    password: notif
    listener:
      simple:
        default-requeue-rejected: false
        retry:
          enabled: true
          max-attempts: 5
          initial-interval: 2s
          max-interval: 30s
          multiplier: 2.0

management:
  endpoints:
    web:
      exposure:
        include: health,info

outbox:
  dispatch:
    enabled: false
    batch-size: 100
    fixed-delay-ms: 5000
    in-progress-timeout-ms: 60000
    max-attempts: 10
    finalize-retry-attempts: 3
    finalize-retry-delay-ms: 200
